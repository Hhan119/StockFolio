server:
  port: 8888
  servlet:
    context-path: /
    session:
      tracking-modes: cookie
      
               
spring:
  application:
    name: StockFolio
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:stockfolio;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

app:
  cors:
    allowed-origins: http://localhost:8888,http://localhost:3000,http://localhost:5173
  jwt:
    secret: U3RvY2tGb2xpb0p3dFNlY3JldEtleUZvckRldmVsb3BtZW50MTIzNDU2Nzg5MA==
    expiration-ms: 86400000

external:
  fmp:
    api-key: ${FMP_API_KEY:${FINANCIAL_API_KEY:}}
    base-url: ${FMP_BASE_URL:https://financialmodelingprep.com/stable}
  krx:
    api-key: ${KRX_API_KEY:}
    base-url: ${KRX_BASE_URL:https://data-dbg.krx.co.kr/svc/apis}
  opendart:
    api-key: ${OPENDART_API_KEY:}
    base-url: ${OPENDART_BASE_URL:https://opendart.fss.or.kr/api}
  finnhub:
    api-key: ${FINNHUB_API_KEY:}
  kis:
    app-key: ${KIS_APP_KEY:}
    app-secret: ${KIS_APP_SECRET:}
  python:
    bin: ${PYTHON_BIN:python}
