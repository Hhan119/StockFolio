server:
  port: 8080
  servlet:
    context-path: /
  forward-headers-strategy: framework

spring:
  application:
    name: StockFolio
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DATABASE_URL:jdbc:postgresql://postgres:5432/stockfolio}
    username: ${POSTGRES_USER:stockfolio}
    password: ${POSTGRES_PASSWORD:change-me}
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

app:
  cors:
    allowed-origins: ${FRONTEND_URL:${DOMAIN_URL:http://localhost}}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}

external:
  finnhub:
    api-key: ${FINANCIAL_API_KEY:${FINNHUB_API_KEY:}}
  kis:
    app-key: ${KIS_APP_KEY:}
    app-secret: ${KIS_APP_SECRET:}
