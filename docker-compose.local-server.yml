services:
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    env_file:
      - .env.local-server
    volumes:
      - frontend_dist:/static
    networks:
      - stockfolio_internal
    restart: unless-stopped

  backend:
    build:
      context: ./back/StockFolio
      dockerfile: Dockerfile
    env_file:
      - .env.local-server
    environment:
      SPRING_PROFILES_ACTIVE: local-server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stockfolio_internal
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.local-server
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - stockfolio_internal
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - stockfolio_internal
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - stockfolio_internal
    restart: unless-stopped

volumes:
  frontend_dist:
  postgres_data:
  redis_data:

networks:
  stockfolio_internal:
    driver: bridge
